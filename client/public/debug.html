<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MentorBridge Debug</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 600px;
        }
        .debug-info {
            text-align: left;
            margin: 20px 0;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 8px;
            font-family: monospace;
            font-size: 14px;
        }
        .debug-item {
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
        }
        .error { color: #e74c3c; }
        .success { color: #27ae60; }
        h1 { color: #333; margin-bottom: 20px; }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px;
        }
        button:hover { background: #5a67d8; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 MentorBridge Debug Page</h1>
        
        <div class="debug-info">
            <div class="debug-item">
                <strong>Environment:</strong> 
                <span id="env">Loading...</span>
            </div>
            <div class="debug-item">
                <strong>API URL:</strong> 
                <span id="api-url">Loading...</span>
            </div>
            <div class="debug-item">
                <strong>Socket URL:</strong> 
                <span id="socket-url">Loading...</span>
            </div>
            <div class="debug-item">
                <strong>Local Storage:</strong> 
                <span id="storage">Loading...</span>
            </div>
            <div class="debug-item">
                <strong>Test API:</strong> 
                <button onclick="testAPI()">Test Connection</button>
                <span id="api-result"></span>
            </div>
        </div>
        
        <button onclick="window.location.href='/'">Back to App</button>
    </div>

    <script>
        // Show environment variables
        document.getElementById('env').textContent = import.meta.env.MODE || 'unknown';
        document.getElementById('api-url').textContent = import.meta.env.VITE_API_URL || 'not set';
        document.getElementById('socket-url').textContent = import.meta.env.VITE_SOCKET_URL || 'not set';
        
        // Show local storage
        const storage = {};
        for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            storage[key] = localStorage.getItem(key);
        }
        document.getElementById('storage').textContent = JSON.stringify(storage, null, 2);
        
        // Test API
        async function testAPI() {
            const resultEl = document.getElementById('api-result');
            resultEl.textContent = 'Testing...';
            
            try {
                const response = await fetch(import.meta.env.VITE_API_URL + '/health');
                const data = await response.json();
                resultEl.textContent = '✅ ' + JSON.stringify(data);
                resultEl.className = 'success';
            } catch (error) {
                resultEl.textContent = '❌ ' + error.message;
                resultEl.className = 'error';
            }
        }
    </script>
</body>
</html>
