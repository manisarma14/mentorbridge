services:
  - type: web
    name: mentorbridge-backend
    env: node
    plan: free
    buildCommand: "npm install"
    startCommand: "npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 7d
      - key: OPENAI_API_KEY
        sync: false
      - key: CLIENT_URL
        value: https://mentorbridge-frontend.vercel.app
      - key: RESEND_API_KEY
        sync: false
    healthCheckPath: /api/health
    autoDeploy: true
